<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المندوب - يلا نروح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #059669;
            margin-bottom: 25px;
        }
        .order-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border-right: 5px solid #059669;
        }
        .order-details p {
            margin: 5px 0;
            font-size: 15px;
            color: #374151;
        }
        .order-details strong {
            color: #111827;
        }
        .accept-btn {
            width: 100%;
            padding: 10px;
            background-color: #059669;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Cairo', sans-serif;
        }
        .accept-btn:hover {
            background-color: #047857;
        }
        .no-orders {
            text-align: center;
            color: #6b7280;
            font-size: 16px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>طلبات التوصيل المتاحة 🚗</h2>
        <div id="ordersList">
            <p class="no-orders">جاري تحميل الطلبات الحالية...</p>
        </div>
    </div>

    <script>
        // إعداد الاتصال بـ Supabase
        const supabaseUrl = 'https://swblfuyivvsrjulztyff.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3YmxmdXlpdnZzcmp1bHp0eWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTQ4NTMsImV4cCI6MjA5NjA3MDg1M30.B_2lxLiEdIWSUGPlLblmi6ob8zBBAIwiOjl1Yb6RhLs';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        // دالة جلب الطلبات "قيد الانتظار" من السيرفر
        async function fetchOrders() {
            const { data: orders, error } = await supabaseClient
                .from('deliveries')
                .select('*')
                .eq('status', 'قيد الانتظار')
                .order('id', { ascending: false });

            const container = document.getElementById('ordersList');
            container.innerHTML = '';

            if (error) {
                container.innerHTML = '<p class="no-orders" style="color:red;">حدث خطأ أثناء جلب الطلبات</p>';
                return;
            }

            if (orders.length === 0) {
                container.innerHTML = '<p class="no-orders">لا توجد طلبات جديدة حالياً ☕</p>';
                return;
            }

            // عرض الطلبات داخل الصفحة
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-details">
                        <p><strong>📦 الغرض:</strong> ${order.item_details}</p>
                        <p><strong>📍 من (الاستلام):</strong> ${order.pickup_location}</p>
                        <p><strong>🏁 إلى (التسليم):</strong> ${order.dropoff_location}</p>
                    </div>
                    <button class="accept-btn" onclick="acceptOrder(${order.id})">استلام الطلب وتبليغ الزبون</button>
                `;
                container.appendChild(card);
            });
        }

        // دالة قبول المندوب للطلب
        async function acceptOrder(orderId) {
            const { error } = await supabaseClient
                .from('deliveries')
                .update({ status: 'تم القبول من المندوب' })
                .eq('id', orderId);

            if (error) {
                alert('حدث خطأ أثناء قبول الطلب');
            } else {
                alert('ممتاز! قمت باستلام الطلب بنجاح، توجه للزبون الآن.');
                fetchOrders(); // تحديث القائمة
            }
        }

        // تشغيل الدالة تلقائياً عند فتح الصفحة
        fetchOrders();
        
        // تحديث الطلبات تلقائياً كل 10 ثوانٍ ليتزامن مع الزبائن
        setInterval(fetchOrders, 10000);
    </script>

</body>
</html>
