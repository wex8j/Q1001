<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يلا نروح - الزبون</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chat-box { border-top: 1px solid #ddd; margin-top: 20px; padding-top: 10px; }
        #chatMessages { height: 150px; overflow-y: scroll; border: 1px solid #eee; margin-bottom: 10px; padding: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>حالة طلبك 📦</h2>
        <div id="statusArea"></div>
        
        <div id="chatBox" class="chat-box" style="display:none;">
            <h4>محادثة المندوب:</h4>
            <div id="chatMessages"></div>
            <input type="text" id="msgInput" style="width:70%">
            <button onclick="sendMsg()">إرسال</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');
        let currentOrderId = localStorage.getItem('last_order_id');

        // دالة إرسال الرسالة
        async function sendMsg() {
            const msg = document.getElementById('msgInput').value;
            await supabase.from('messages').insert({ order_id: currentOrderId, sender: 'Client', message: msg });
            document.getElementById('msgInput').value = '';
        }

        // تحديث الرسائل لحظياً
        supabase.channel('room').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            document.getElementById('chatMessages').innerHTML += `<div>${payload.new.sender}: ${payload.new.message}</div>`;
        }).subscribe();
    </script>
</body>
</html>
