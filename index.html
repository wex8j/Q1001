<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب توصيل - يلا نروح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Cairo',sans-serif;background:#f0f4ff;direction:rtl;min-height:100vh;padding:16px;}
        .wrap{max-width:440px;margin:0 auto;}

        .card{background:white;border-radius:20px;box-shadow:0 4px 20px rgba(79,70,229,.08);padding:24px;margin-bottom:16px;}
        h2{text-align:center;color:#4f46e5;font-weight:800;font-size:22px;margin-bottom:18px;}
        .sub{text-align:center;color:#94a3b8;font-size:13px;margin-top:-12px;margin-bottom:18px;}

        label{font-weight:600;color:#475569;display:block;margin-bottom:6px;font-size:13px;}
        input[type=text],input[type=tel]{width:100%;padding:12px 14px;margin-bottom:14px;border:1.5px solid #e2e8f0;border-radius:12px;font-family:'Cairo';font-size:14px;outline:none;transition:border .2s;color:#1e293b;}
        input:focus{border-color:#4f46e5;}

        #map{height:210px;border-radius:14px;margin-bottom:14px;border:1.5px solid #e2e8f0;}
        
        /* hint steps */
        .hint{font-size:12px;color:#64748b;margin-bottom:10px;padding:8px 12px;background:#f8fafc;border-radius:10px;border-right:3px solid #4f46e5;transition:all .3s;}
        .hint.active{background:#eef2ff;color:#3730a3;border-color:#6366f1;font-weight:700;}
        .hint.done{background:#f0fdf4;color:#166534;border-color:#22c55e;}

        /* step indicators */
        .steps-row{display:flex;gap:8px;margin-bottom:14px;}
        .step{flex:1;text-align:center;padding:8px 6px;border-radius:10px;font-size:12px;font-weight:700;border:1.5px solid #e2e8f0;color:#94a3b8;transition:all .3s;}
        .step.active{background:#eef2ff;border-color:#6366f1;color:#4f46e5;}
        .step.done{background:#f0fdf4;border-color:#22c55e;color:#166534;}

        /* search */
        .search-row{display:flex;gap:8px;margin-bottom:12px;}
        .search-row input{margin-bottom:0;flex:1;}
        .search-btn{padding:12px 16px;background:#4f46e5;color:white;border:none;border-radius:12px;font-family:'Cairo';font-weight:700;cursor:pointer;white-space:nowrap;font-size:13px;}
        #searchResults{display:none;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:12px;max-height:160px;overflow-y:auto;}

        .price-box{background:#eef2ff;padding:12px;border-radius:12px;margin-bottom:14px;text-align:center;font-weight:700;color:#312e81;font-size:14px;display:none;border:1px solid #c7d2fe;}

        /* confirm pickup button */
        .confirm-pickup-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Cairo';margin-bottom:10px;display:none;transition:opacity .2s;}
        .confirm-pickup-btn:hover{opacity:.9;}

        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Cairo';transition:opacity .2s;}
        .btn:disabled{opacity:.5;cursor:not-allowed;}

        /* summary badges */
        .loc-summary{display:none;background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:12px;color:#166534;font-weight:600;}
        .loc-summary span{display:block;}

        /* حالة الطلب */
        #statusBox{display:none;}
        .status-card{background:white;border-radius:20px;box-shadow:0 4px 20px rgba(79,70,229,.1);padding:20px;text-align:center;}
        .status-anim{font-size:36px;margin-bottom:10px;display:block;}
        .status-title{font-size:18px;font-weight:800;color:#4f46e5;margin-bottom:6px;}
        .status-sub{font-size:13px;color:#94a3b8;}

        .cap-card{background:#f0fdf4;border:1px solid #86efac;border-radius:14px;padding:16px;margin-top:14px;text-align:right;}
        .cap-card h4{color:#166534;font-weight:800;margin-bottom:10px;font-size:15px;}
        .cap-card p{font-size:14px;color:#15803d;margin-bottom:6px;}
        .cap-card a{color:#166534;font-weight:700;}

        #chatSection{display:none;margin-top:14px;border:1.5px solid #e2e8f0;border-radius:16px;overflow:hidden;background:white;}
        .chat-hdr{background:#4f46e5;color:white;padding:11px 15px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;}
        .live-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;animation:blink 1.4s infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
        #chatMsgs{height:210px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#f8fafc;}
        .msg{max-width:78%;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
        .msg.me{background:#4f46e5;color:white;align-self:flex-start;border-bottom-right-radius:3px;}
        .msg.them{background:white;color:#1e293b;align-self:flex-end;border:1px solid #e2e8f0;border-bottom-left-radius:3px;}
        .msg .t{font-size:10px;opacity:.65;margin-top:3px;}
        .chat-footer{display:flex;gap:8px;padding:10px;border-top:1px solid #e2e8f0;background:white;}
        .chat-footer input{flex:1;padding:9px 13px;border:1.5px solid #e2e8f0;border-radius:20px;font-family:'Cairo';font-size:13px;outline:none;color:#1e293b;}
        .chat-footer input:focus{border-color:#4f46e5;}
        .send-btn{padding:9px 14px;background:#4f46e5;border:none;border-radius:20px;color:white;font-size:18px;cursor:pointer;flex-shrink:0;}
    </style>
</head>
<body>
<div class="wrap">

    <!-- تسجيل الدخول -->
    <div id="loginBox" class="card">
        <h2>يلا نروح 🏍️</h2>
        <p class="sub">سجل بياناتك وأطلب مندوب بثواني</p>
        <label>الاسم الكامل</label>
        <input type="text" id="clientName" placeholder="اكتب اسمك هنا">
        <label>رقم الهاتف</label>
        <input type="tel" id="clientPhone" placeholder="07XXXXXXXXX">
        <button class="btn" onclick="saveClientLogin()">دخول للموقع ⚡</button>
    </div>

    <!-- نموذج الطلب -->
    <div id="orderBox" style="display:none;">
        <div class="card">
            <h2>طلب مندوب توصيل 📦</h2>
            <form id="orderForm">
                <label>شنو الغرض المُراد توصيله؟</label>
                <input type="text" id="itemDetails" placeholder="مثال: أوراق، هدايا، طرد...">

                <!-- مؤشر الخطوات -->
                <div class="steps-row">
                    <div class="step active" id="step1">📍 1. مكان الاستلام</div>
                    <div class="step" id="step2">🏁 2. مكان التسليم</div>
                </div>

                <!-- بحث عن منطقة -->
                <label>ابحث عن منطقة</label>
                <div class="search-row">
                    <input type="text" id="searchInput" placeholder="مثال: الرمادي، حي العسكري...">
                    <button type="button" class="search-btn" onclick="searchArea()">🔍 بحث</button>
                </div>
                <div id="searchResults"></div>

                <!-- تلميح الخريطة -->
                <div class="hint active" id="mapHint">📍 الخطوة 1: اضغط على الخريطة لتحديد مكان <strong>الاستلام</strong></div>
                <div id="map"></div>

                <!-- زر تأكيد الاستلام -->
                <button type="button" class="confirm-pickup-btn" id="confirmPickupBtn" onclick="confirmPickup()">
                    ✅ تأكيد مكان الاستلام — انتقل لتحديد التسليم
                </button>

                <!-- ملخص الموقعين -->
                <div class="loc-summary" id="locSummary">
                    <span id="pickupSummary"></span>
                    <span id="dropoffSummary"></span>
                </div>

                <div class="price-box" id="priceBox">📏 المسافة: <span id="distLbl">0</span> كم &nbsp;|&nbsp; 💰 الكروة: <span id="priceLbl">0</span> د.ع</div>
                <button class="btn" type="submit" id="submitBtn" style="display:none;">تأكيد وأرسل للمناديب ⚡</button>
            </form>
        </div>
    </div>

    <!-- حالة الطلب -->
    <div id="statusBox">
        <div class="status-card">
            <span class="status-anim" id="statusAnim">🔄</span>
            <div class="status-title" id="statusTitle">جاري البحث عن مندوب...</div>
            <div class="status-sub" id="statusSub">سيصلك تأكيد بمجرد قبول أحد المناديب</div>
            <div id="capDetails"></div>
            <div id="chatSection">
                <div class="chat-hdr"><span class="live-dot"></span>محادثة مع المندوب 💬</div>
                <div id="chatMsgs"><span style="color:#94a3b8;font-size:13px;text-align:center;display:block;margin:auto;">لا توجد رسائل بعد...</span></div>
                <div class="chat-footer">
                    <button type="button" class="send-btn" onclick="sendMsg()">➤</button>
                    <input type="text" id="chatInput" placeholder="اكتب رسالة للمندوب..." onkeydown="if(event.key==='Enter')sendMsg()">
                </div>
            </div>
        </div>
    </div>

</div>
<script>
const supabaseUrl='https://swblfuyivvsrjulztyff.supabase.co';
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3YmxmdXlpdnZzcmp1bHp0eWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTQ4NTMsImV4cCI6MjA5NjA3MDg1M30.B_2lxLiEdIWSUGPlLblmi6ob8zBBAIwiOjl1Yb6RhLs';
const sc=supabase.createClient(supabaseUrl,supabaseKey);

let map,pickupMarker=null,dropoffMarker=null;
let pickupC=null,dropoffC=null;
let pickupConfirmed=false; // ← المفتاح الرئيسي
let dist=0,price=0,orderId=null;
let backupTimer=null;
let chatStarted=false;
let shownMsgIds=new Set();

const pickIcon=()=>L.divIcon({html:'<div style="background:#4f46e5;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(79,70,229,.6);"></div>',iconAnchor:[9,9],className:''});
const dropIcon=()=>L.divIcon({html:'<div style="background:#f59e0b;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(245,158,11,.6);"></div>',iconAnchor:[9,9],className:''});

window.onload=function(){
    if(localStorage.getItem('client_logged')==='true') showOrderForm();
}

function saveClientLogin(){
    const n=document.getElementById('clientName').value.trim();
    const p=document.getElementById('clientPhone').value.trim();
    if(!n||!p){alert("الرجاء كتابة الاسم والرقم!");return;}
    localStorage.setItem('client_name',n);
    localStorage.setItem('client_phone',p);
    localStorage.setItem('client_logged','true');
    showOrderForm();
}

function showOrderForm(){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('orderBox').style.display='block';
    map=L.map('map').setView([33.4208,43.3022],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    map.on('click',function(e){
        const{lat,lng}=e.latlng;

        if(!pickupConfirmed){
            // ── المرحلة 1: تحديد الاستلام ──
            if(pickupMarker) map.removeLayer(pickupMarker);
            pickupC=[lat,lng];
            pickupMarker=L.marker(pickupC,{icon:pickIcon()}).addTo(map).bindTooltip('📍 مكان الاستلام',{permanent:true,direction:'top'});
            document.getElementById('confirmPickupBtn').style.display='block';
            document.getElementById('mapHint').className='hint active';
            document.getElementById('mapHint').innerHTML='📍 تم تحديد نقطة الاستلام — اضغط <strong>تأكيد</strong> للانتقال';
        } else {
            // ── المرحلة 2: تحديد التسليم ──
            if(dropoffMarker) map.removeLayer(dropoffMarker);
            dropoffC=[lat,lng];
            dropoffMarker=L.marker(dropoffC,{icon:dropIcon()}).addTo(map).bindTooltip('🏁 مكان التسليم',{permanent:true,direction:'top'});
            calcDistance();
        }
    });
}

function confirmPickup(){
    if(!pickupC){alert("اختر نقطة الاستلام على الخريطة أولاً!");return;}
    pickupConfirmed=true;

    // تحديث مؤشر الخطوات
    document.getElementById('step1').className='step done';
    document.getElementById('step2').className='step active';

    // تحديث التلميح
    const hint=document.getElementById('mapHint');
    hint.className='hint active';
    hint.innerHTML='🏁 الخطوة 2: اضغط على الخريطة لتحديد مكان <strong>التسليم</strong>';

    // إخفاء زر التأكيد
    document.getElementById('confirmPickupBtn').style.display='none';

    // إظهار ملخص الاستلام
    document.getElementById('locSummary').style.display='block';
    document.getElementById('pickupSummary').innerText=`✅ الاستلام: ${pickupC[0].toFixed(4)}, ${pickupC[1].toFixed(4)}`;
    document.getElementById('dropoffSummary').innerText='⏳ التسليم: لم يُحدد بعد';
}

function calcDistance(){
    const[la1,lo1]=pickupC,[la2,lo2]=dropoffC;
    const R=6371,dL=(la2-la1)*Math.PI/180,dN=(lo2-lo1)*Math.PI/180;
    const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
    dist=(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
    price=dist<=3?3000:dist<=7?5000:7000;
    document.getElementById('distLbl').innerText=dist;
    document.getElementById('priceLbl').innerText=price.toLocaleString();
    document.getElementById('priceBox').style.display='block';

    // تحديث الخطوتين
    document.getElementById('step2').className='step done';
    const hint=document.getElementById('mapHint');
    hint.className='hint done';
    hint.innerHTML='✅ تم تحديد الموقعين! راجع الأسعار وأرسل الطلب';

    // تحديث ملخص
    document.getElementById('dropoffSummary').innerText=`✅ التسليم: ${dropoffC[0].toFixed(4)}, ${dropoffC[1].toFixed(4)}`;

    map.fitBounds([pickupC,dropoffC],{padding:[30,30]});
    document.getElementById('submitBtn').style.display='block';
}

/* ──── البحث عن منطقة ──── */
async function searchArea(){
    const q=document.getElementById('searchInput').value.trim();
    if(!q) return;
    const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' العراق')}&format=json&limit=5`);
    const data=await res.json();
    const box=document.getElementById('searchResults');
    if(!data.length){box.style.display='block';box.innerHTML='<p style="padding:10px;color:#94a3b8;font-size:13px;">لا توجد نتائج</p>';return;}
    box.style.display='block';
    box.innerHTML=data.map(r=>`
        <div onclick="goToResult(${r.lat},${r.lon},'${r.display_name.replace(/'/g,"").substring(0,50)}')"
             style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:13px;color:#374151;"
             onmouseover="this.style.background='#eef2ff'" onmouseout="this.style.background='white'">
            📍 ${r.display_name.substring(0,60)}
        </div>`).join('');
}

function goToResult(lat,lon,name){
    map.setView([lat,lon],15);
    document.getElementById('searchResults').style.display='none';
    document.getElementById('searchInput').value=name;
}

/* ──── حالة الطلب ──── */
function ftime(ts){const d=new Date(ts);return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}

function updateStatus(order){
    if(order.status==='تم القبول من المندوب'){
        if(backupTimer) clearInterval(backupTimer);
        document.getElementById('statusAnim').innerText='✅';
        document.getElementById('statusTitle').innerText='تم قبول طلبك!';
        document.getElementById('statusSub').innerText='المندوب في الطريق إليك الآن';
        document.getElementById('capDetails').innerHTML=`
            <div class="cap-card">
                <h4>🏍️ معلومات المندوب</h4>
                <p>👤 <strong>${order.captain_name||'غير معروف'}</strong></p>
                <p>📞 <a href="tel:${order.captain_phone}">${order.captain_phone||'—'}</a></p>
                <p>🛵 ${order.captain_bike||'دراجة نارية'}</p>
            </div>`;
        if(!chatStarted){chatStarted=true;document.getElementById('chatSection').style.display='block';startChat();}
    } else if(order.status==='تم التسليم'){
        if(backupTimer) clearInterval(backupTimer);
        document.getElementById('statusAnim').innerText='🎉';
        document.getElementById('statusTitle').innerText='تم التسليم بنجاح!';
        document.getElementById('statusSub').innerText='شكراً لاستخدامك يلا نروح';
    }
}

async function checkStatus(){
    if(!orderId) return;
    const{data}=await sc.from('deliveries').select('*').eq('id',orderId).single();
    if(data) updateStatus(data);
}

function appendMsg(msg){
    if(shownMsgIds.has(msg.id)) return;
    shownMsgIds.add(msg.id);
    const box=document.getElementById('chatMsgs');
    const empty=box.querySelector('span');
    if(empty) empty.remove();
    const isMe=msg.sender_role==='client';
    const d=document.createElement('div');
    d.className='msg '+(isMe?'me':'them');
    d.innerHTML=`${msg.message}<div class="t">${ftime(msg.created_at)}</div>`;
    box.appendChild(d);
    box.scrollTop=box.scrollHeight;
}

async function startChat(){
    const{data}=await sc.from('chat_messages').select('*').eq('order_id',orderId).order('created_at',{ascending:true});
    if(data) data.forEach(appendMsg);
    sc.channel('cli-chat-'+orderId)
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages',filter:`order_id=eq.${orderId}`},(p)=>{appendMsg(p.new);}).subscribe();
}

async function sendMsg(){
    const input=document.getElementById('chatInput');
    const text=input.value.trim();
    if(!text||!orderId) return;
    input.value='';
    const{error}=await sc.from('chat_messages').insert([{
        order_id:orderId,sender_role:'client',
        sender_name:localStorage.getItem('client_name')||'الزبون',message:text
    }]);
    if(error){console.error(error);input.value=text;}
}

document.getElementById('orderForm').addEventListener('submit',async function(e){
    e.preventDefault();
    if(!pickupC||!dropoffC){alert("حدد موقعي الاستلام والتسليم على الخريطة!");return;}
    const item=document.getElementById('itemDetails').value.trim();
    if(!item){alert("اكتب وصف الغرض!");return;}
    const btn=document.getElementById('submitBtn');
    btn.disabled=true;btn.innerText='⏳ جاري الإرسال...';

    const{data,error}=await sc.from('deliveries').insert([{
        item_details:item,
        pickup_location:`إحداثيات: ${pickupC[0].toFixed(4)}, ${pickupC[1].toFixed(4)}`,
        dropoff_location:`إحداثيات: ${dropoffC[0].toFixed(4)}, ${dropoffC[1].toFixed(4)}`,
        distance:dist,price:price,
        client_name:localStorage.getItem('client_name'),
        client_phone:localStorage.getItem('client_phone'),
        status:'قيد الانتظار'
    }]).select();

    if(error){alert('حدث خطأ، حاول مرة ثانية');btn.disabled=false;btn.innerText='تأكيد وأرسل للمناديب ⚡';}
    else{
        orderId=data[0].id;
        document.getElementById('orderBox').style.display='none';
        document.getElementById('statusBox').style.display='block';
        backupTimer=setInterval(checkStatus,2500);
        sc.channel('track-'+orderId)
            .on('postgres_changes',{event:'*',schema:'public',table:'deliveries'},(p)=>{
                if(p.new&&p.new.id===orderId) updateStatus(p.new);
            }).subscribe();
    }
});
</script>
</body>
</html>
